config:
  feishu:
    assistant:
      app_id: "cli_xxx"
      app_secret: "..."
      encrypt_key: "..."
      verification_token: "..."
      bot_open_id: "ou_xxx"
      bot_name: "飞书 Codex 助手"
      domain: "feishu"
      reply_mode: "codex"
      reply_prefix: "AI 助手："
      ignore_self_messages: true
      auto_reply: true
      require_mention: true
      require_mention_group_only: true
      progress:
        enabled: true
        message: "已接收，正在执行。"
        mode: "doc"
        doc:
          title_prefix: "Codex 任务进度"
          share_to_chat: true
          link_scope: "same_tenant"
          include_user_message: true
          write_final_reply: true
      codex:
        bin: "codex"
        api_key: "sk-..."
        model: "gpt-5.4"
        reasoning_effort: "xhigh"
        profile: ""
        cwd: "/absolute/path/to/your/workspace"
        add_dirs:
          - "/absolute/path/to/another/workspace"
        history_turns: 6
        system_prompt: "你是“飞书 Codex 助手”，通过飞书和用户交流。请直接回答用户问题，不要复述用户原话。"
      speech:
        enabled: true
        api_key: "sk-..."
        model: "gpt-4o-mini-transcribe"
        language: ""
        base_url: "https://api.openai.com/v1"
        ffmpeg_bin: ""
