name: go-binaries

on:
  push:
    tags: ["v*"]
  schedule:
    # Daily build tag in Asia/Shanghai date (computed in workflow)
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  meta:
    name: resolve-tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout (for tag creation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version/ref
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "ref=${GITHUB_REF}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git fetch --tags --force
          DATE="$(TZ=Asia/Shanghai date +%Y.%m.%d)"
          BASE="v${DATE}"
          TAG="${BASE}"
          n=1
          while git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; do
            n=$((n+1))
            TAG="${BASE}-${n}"
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "daily build ${TAG}"
          git push origin "${TAG}"

          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "ref=refs/tags/${TAG}" >> "${GITHUB_OUTPUT}"

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [meta]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          OUT="dist/${VERSION}/${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${OUT}"

          export CGO_ENABLED=0
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"

          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          go build -trimpath -ldflags "-s -w" -o "${OUT}/suncodexclawd${EXT}" ./cmd/suncodexclawd

          (cd "dist/${VERSION}" && sha256sum "${{ matrix.goos }}_${{ matrix.goarch }}/"* > "${{ matrix.goos }}_${{ matrix.goarch }}.sha256")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.meta.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ needs.meta.outputs.version }}/${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: GitHub release
    needs: [meta, build]
    runs-on: ubuntu-latest
    if: startsWith(needs.meta.outputs.version, 'v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Repack for release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          for dir in dist/*/*; do
            base="$(basename "${dir}")"
            parent="$(basename "$(dirname "${dir}")")"
            tar -czf "release/${parent}-${base}.tar.gz" -C "${dir}" .
            if [[ -f "dist/${parent}/${base}.sha256" ]]; then
              cp "dist/${parent}/${base}.sha256" "release/${parent}-${base}.sha256"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          files: release/*
          generate_release_notes: true
