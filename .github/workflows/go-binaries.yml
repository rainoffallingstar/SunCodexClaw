name: go-binaries

on:
  push:
    tags: ["v*"]
  schedule:
    # Daily build tag in Asia/Shanghai date (computed in workflow)
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  meta:
    name: resolve-tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
    steps:
      - name: Checkout (for tag creation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve version/ref
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "ref=${GITHUB_REF}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git fetch --tags --force
          DATE="$(TZ=Asia/Shanghai date +%Y.%m.%d)"
          TAG="v${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${TAG}" -m "daily build ${TAG}"
          git push --force origin "refs/tags/${TAG}"

          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "ref=refs/tags/${TAG}" >> "${GITHUB_OUTPUT}"

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [meta]
    # Avoid duplicate builds: schedule/workflow_dispatch creates/updates the date tag (actor=github-actions[bot]),
    # which triggers a tag push event. Skip the tag-push run when it was created by the bot.
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.meta.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          OUT="dist/${VERSION}/${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${OUT}"

          export CGO_ENABLED=0
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"

          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          go build -trimpath -ldflags "-s -w" -o "${OUT}/suncodexclawd${EXT}" ./cmd/suncodexclawd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.meta.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/${{ needs.meta.outputs.version }}/${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: GitHub release
    needs: [meta, build]
    runs-on: ubuntu-latest
    if: (github.event_name != 'push' || github.actor != 'github-actions[bot]') && startsWith(needs.meta.outputs.version, 'v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Repack for release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          shopt -s nullglob
          for dir in dist/*; do
            [[ -d "${dir}" ]] || continue
            name="$(basename "${dir}")"
            tar -czf "release/${name}.tar.gz" -C "${dir}" .
            sha256sum "release/${name}.tar.gz" > "release/${name}.tar.gz.sha256"
          done

      - name: Delete existing release (if any)
        shell: bash
        env:
          TAG: ${{ needs.meta.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Delete existing release for the tag (so reruns overwrite assets cleanly).
          python3 - <<'PY'
import json, os, sys, urllib.request, urllib.error
repo = os.environ["GITHUB_REPOSITORY"]
tag = os.environ["TAG"]
token = os.environ["GH_TOKEN"]
req = urllib.request.Request(
  f"https://api.github.com/repos/{repo}/releases/tags/{tag}",
  headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
)
try:
  with urllib.request.urlopen(req) as r:
    data = json.loads(r.read().decode("utf-8"))
    rid = data.get("id")
except urllib.error.HTTPError as e:
  if e.code == 404:
    sys.exit(0)
  raise
if not rid:
  sys.exit(0)
req2 = urllib.request.Request(
  f"https://api.github.com/repos/{repo}/releases/{rid}",
  headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
  method="DELETE",
)
with urllib.request.urlopen(req2) as r:
  pass
PY
      - name: Create GitHub Release (upload)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          files: release/*
          generate_release_notes: true
